name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# CI verifies the serving layer — lint, tests, Docker build, and /predict smoke
# test against the committed model artifact. Retraining is a separate pipeline
# triggered by drift alerts or a scheduled job, not by every PR.

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/locustfile.py

  api-smoke-test:
    name: API Smoke Test (Docker)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-api:ci .

      - name: Start container
        run: |
          docker run -d \
            --name fraud-api \
            -p 8000:8000 \
            -e MLFLOW_RUN_ID=${{ secrets.MLFLOW_RUN_ID }} \
            -e MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} \
            -e MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }} \
            -e MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }} \
            fraud-api:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            BODY=$(curl -s http://localhost:8000/health 2>/dev/null) || true
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null) || true
            if [ "$STATUS" = "ok" ]; then echo "Healthy after $i attempts"; exit 0; fi
            echo "Waiting... ($i/30) body=$BODY"; sleep 3
          done
          echo "Container never became healthy"
          docker logs fraud-api
          exit 1

      - name: Smoke test /predict
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "amount_gbp": 45.50,
              "hour_of_day": 14,
              "day_of_week": 2,
              "card_avg_amount_30d": 60.0,
              "card_txn_count_1h": 1,
              "card_amount_sum_1h": 45.50,
              "card_txn_count_6h": 2,
              "card_amount_sum_6h": 90.0,
              "card_txn_count_24h": 3,
              "card_amount_sum_24h": 120.0,
              "card_txn_count_7d": 8,
              "card_amount_sum_7d": 320.0,
              "card_merch_txn_count_1h": 0,
              "time_since_last_card_txn_sec": 14400.0,
              "amount_to_card_avg_ratio": 0.758,
              "log_amount": 3.8286,
              "hour_sin": 0.9749,
              "hour_cos": -0.2225,
              "dow_sin": 0.7818,
              "dow_cos": 0.6235,
              "merchant_category": "electronics"
            }')
          echo "$RESPONSE"
          python3 - <<EOF
          import json, sys
          r = json.loads("""$RESPONSE""")
          assert "fraud_probability" in r, "Missing fraud_probability"
          assert r["f1_opt_decision"] in ("BLOCK", "PASS"), "Invalid f1_opt_decision"
          assert r["recall80_decision"] in ("REVIEW", "PASS"), "Invalid recall80_decision"
          assert 0.0 <= r["fraud_probability"] <= 1.0, "Probability out of range"
          print(f"PASS  fraud_probability={r['fraud_probability']}  decision={r['f1_opt_decision']}")
          EOF

      - name: Stop container
        if: always()
        run: docker rm -f fraud-api
